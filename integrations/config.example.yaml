# BSS Relay — Model Configuration
#
# Copy this file to config.yaml and edit to match your setup.
# Or run: bss relay --setup
#
# Supported backends:
#   gguf        — Local GGUF files via llama-cpp-python
#   openai      — Any OpenAI-compatible API (Ollama, LM Studio, vLLM, OpenAI, etc.)
#   anthropic   — Anthropic Claude models
#   gemini      — Google Gemini models
#   huggingface — Hugging Face Inference API
#
# The 'backend' field is optional — defaults to 'gguf' if omitted.

models:

  # ── Local GGUF example ──
  # A:
  #   name: Qwen3-4B
  #   backend: gguf
  #   path: ~/mind/Qwen3-4B-Q4_K_M.gguf
  #   n_ctx: 4096
  #   max_tokens: 1024
  #   temperature: 0.7
  #   threads: 4
  #   system_suffix: " /no_think"  # Optional — appended to system prompt (e.g. Qwen3 thinking control)
  #   color: "#64B5F6"

  # ── Ollama example ──
  # A:
  #   name: Qwen3-8B
  #   backend: openai
  #   base_url: http://localhost:11434/v1
  #   model: qwen3:8b
  #   max_tokens: 1024
  #   temperature: 0.5
  #   color: "#FF8F00"

  # ── OpenAI-compatible API example ──
  # A:
  #   name: GPT-4
  #   backend: openai
  #   base_url: https://api.openai.com/v1
  #   api_key: sk-...
  #   model: gpt-4
  #   max_tokens: 2048
  #   temperature: 0.3
  #   color: "#CE93D8"

  # ── Anthropic example ──
  # A:
  #   name: Claude Sonnet
  #   backend: anthropic
  #   api_key: sk-ant-...          # or set ANTHROPIC_API_KEY env var
  #   model: claude-sonnet-4-20250514
  #   max_tokens: 1024
  #   temperature: 0.7
  #   color: "#CE93D8"

  # ── Google Gemini example ──
  # A:
  #   name: Gemini Flash
  #   backend: gemini
  #   api_key: AI...               # or set GOOGLE_API_KEY / GEMINI_API_KEY env var
  #   model: gemini-2.0-flash
  #   max_tokens: 1024
  #   temperature: 0.7
  #   color: "#81C784"

  # ── Hugging Face example ──
  # A:
  #   name: Mistral-7B
  #   backend: huggingface
  #   api_key: hf_...              # or set HF_TOKEN / HUGGING_FACE_HUB_TOKEN env var
  #   model: mistralai/Mistral-7B-Instruct-v0.3
  #   max_tokens: 1024
  #   temperature: 0.7
  #   color: "#FF7043"
